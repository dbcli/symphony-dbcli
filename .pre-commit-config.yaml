repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - alembic>=1.18.4
          - fastapi>=0.136.3
          - httpx>=0.28.1
          - jinja2>=3.1
          - pyjwt[crypto]>=2.10
          - python-multipart>=0.0.29
          - sqlalchemy>=2.0.50
          - types-jinja2>=2.11.9
          - uvicorn>=0.48.0
