{% extends "base.html" %}
{% block page_actions %}
<a class="button-link" href="/sources">Sources</a>
{% endblock %}
{% block body %}
<section class="panel narrow-panel">
  <form class="stacked-form" method="post" action="/sources/{{ source.id }}/delete">
    <div class="source-form-header">
      <span class="kicker">Repository</span>
      <strong>{{ source.repo }}</strong>
    </div>

    <p class="form-hint">
      Delete <strong>{{ source.display_name }}</strong> and its synced source board data.
    </p>

    <label for="confirmation">Type {{ source.display_name }} to confirm</label>
    <input
      id="confirmation"
      name="confirmation"
      required
      autocomplete="off"
      value="{{ confirmation }}"
    />

    {% if error %}
    <p class="form-error">{{ error }}</p>
    {% endif %}

    <div class="form-actions">
      <button type="submit">Delete Source</button>
      <a class="button-link quiet" href="/sources">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
