{% extends "base.html" %}
{% block page_actions %}
<div class="page-actions">
  <a class="button-link" href="/board/source/{{ thread.source_id }}">Board</a>
  <a class="button-link quiet" href="/work-items/{{ thread.work_item_id }}">Work Item #{{ thread.work_item_id }}</a>
</div>
{% endblock %}
{% block body %}
{% include "chats/_status.html" %}

{% if error %}
<section class="panel">
  <p class="form-error">{{ error }}</p>
</section>
{% endif %}

{% include "chats/_thread.html" %}

<section class="panel">
  <form class="stacked-form" method="post" action="/chats/{{ thread.id }}/messages" data-chat-submit-form>
    <label for="message">Reply</label>
    <textarea id="message" name="message" rows="4" required autofocus>{{ message }}</textarea>
    <div class="form-actions">
      <button type="submit">Send</button>
    </div>
  </form>
</section>
{% endblock %}
