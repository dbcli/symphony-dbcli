{% extends "base.html" %}
{% block body %}
<section>
  <h2>Manifest Code</h2>
  {% if code %}
  <p>Exchange this temporary code within one hour.</p>
  <pre><code>{{ code }}</code></pre>
  <p class="muted">State: {{ state or "-" }}</p>
  <pre><code>uv run symphony-dbcli github-app convert --code {{ code }}</code></pre>
  {% else %}
  <p class="empty">GitHub did not return a code.</p>
  {% endif %}
</section>
{% endblock %}
